<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngFlow - Học Tiếng Anh Thông Minh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-green-500">EngFlow</h1>
            <div class="flex gap-4 items-center">
                <span class="flex items-center gap-1 text-orange-500 font-bold"><i class="fas fa-fire"></i> <span id="streak">0</span></span>
                <span class="flex items-center gap-1 text-blue-500 font-bold"><i class="fas fa-star"></i> <span id="exp">0</span></span>
                <button onclick="document.getElementById('fileInput').click()" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm">Tải file từ vựng</button>
                <input type="file" id="fileInput" class="hidden" accept=".json">
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <section class="mb-8">
            <h2 class="text-xl font-bold mb-4">Lộ trình học A1 - B1</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-2 border-gray-100 hover:border-green-400 cursor-pointer transition-all" onclick="startLesson('family')">
                    <div class="text-3xl mb-2">🏠</div>
                    <h3 class="font-bold text-lg">Family & Friends</h3>
                    <p class="text-gray-500 text-sm">Trình độ: A1</p>
                    <div class="w-full bg-gray-200 h-2 mt-4 rounded-full"><div class="bg-green-500 h-2 rounded-full w-1/3"></div></div>
                </div>
                </div>
        </section>

        <section class="bg-purple-600 text-white p-6 rounded-2xl shadow-lg">
            <h2 class="text-xl font-bold mb-2">Chế độ Multiplayer</h2>
            <p class="mb-4 text-purple-100">Thi đấu trực tiếp cùng bạn bè!</p>
            <button class="bg-white text-purple-600 px-6 py-2 rounded-xl font-bold hover:bg-purple-50">Tìm trận ngay</button>
        </section>
    </main>

    <script>
        function startLesson(topic) {
            window.location.href = `learn.html?topic=${topic}`;
        }
    </script>
</body>
</html>
