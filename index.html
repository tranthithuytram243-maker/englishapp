<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngFlow - Học Tiếng Anh Thông Minh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; }
        .progress-shadow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        .hidden-page { display: none; }
        .correct-bg { background-color: #dcfce7; border-top: 4px solid #22c55e; }
        .incorrect-bg { background-color: #fee2e2; border-top: 4px solid #ef4444; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav id="navbar" class="bg-white border-b-2 border-gray-200 p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black text-green-500 tracking-tight cursor-pointer" onclick="showPage('home-page')">EngFlow</h1>
            <div class="flex gap-6 items-center">
                <div class="flex items-center gap-2 bg-orange-100 px-3 py-1 rounded-full text-orange-600 font-bold">
                    <i class="fas fa-fire"></i> <span id="streak-val">0</span>
                </div>
                <div class="flex items-center gap-2 bg-blue-100 px-3 py-1 rounded-full text-blue-600 font-bold">
                    <i class="fas fa-star"></i> <span id="exp-val">0</span>
                </div>
            </div>
        </div>
    </nav>

    <section id="home-page" class="max-w-4xl mx-auto p-6 animate-fade-in">
        <div class="bg-white p-8 rounded-3xl border-2 border-gray-200 mb-8 shadow-sm">
            <h2 class="text-2xl font-black mb-2">Chào mừng, Polyglot! 🌏</h2>
            <p class="text-gray-500 mb-6">Hôm nay bạn muốn rèn luyện kỹ năng nào?</p>
            <div class="flex gap-4">
                <button onclick="document.getElementById('fileInput').click()" class="bg-white border-2 border-gray-200 px-6 py-2 rounded-2xl font-bold hover:bg-gray-50 transition">
                    <i class="fas fa-folder-open mr-2"></i>Tải lên từ vựng (.json)
                </button>
                <input type="file" id="fileInput" class="hidden" accept=".json">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="topics-grid">
            </div>

        <div class="mt-10 bg-indigo-600 rounded-3xl p-8 text-white flex flex-col md:flex-row justify-between items-center gap-6 shadow-xl">
            <div>
                <h3 class="text-2xl font-black mb-1">Multiplayer Mode ⚔️</h3>
                <p class="text-indigo-100">Thi đấu 1vs1 cùng 22 học viên khác trong lớp!</p>
            </div>
            <button class="bg-white text-indigo-600 px-8 py-4 rounded-2xl font-black hover:bg-indigo-50 transition shadow-lg active:scale-95">TÌM TRẬN NGAY</button>
        </div>
    </section>

    <section id="learn-page" class="hidden-page h-screen bg-white fixed inset-0 z-[60]">
        <div class="max-w-4xl mx-auto flex items-center gap-4 p-6">
            <button onclick="exitLesson()" class="text-gray-400 text-3xl font-bold hover:text-gray-600 transition">✕</button>
            <div class="flex-1 bg-gray-200 h-4 rounded-full overflow-hidden">
                <div id="lesson-progress" class="bg-green-500 h-full transition-all duration-500 progress-shadow" style="width: 10%"></div>
            </div>
        </div>

        <div class="max-w-2xl mx-auto p-6 mt-10">
            <h2 id="task-instruction" class="text-3xl font-black mb-10 text-gray-800"></h2>

            <div id="ui-listening" class="hidden text-center">
                <button onclick="playAudio()" class="bg-blue-500 w-32 h-32 rounded-3xl shadow-xl text-white text-5xl hover:bg-blue-400 transition-all active:scale-90 mb-12">
                    <i class="fas fa-volume-up"></i>
                </button>
                <input type="text" id="input-listen" autocomplete="off" class="w-full border-b-4 border-gray-200 p-4 text-2xl outline-none focus:border-blue-400 transition-colors text-center font-bold" placeholder="Gõ câu bạn nghe được">
            </div>

            <div id="ui-writing" class="hidden">
                <div class="flex items-start gap-4 mb-8">
                    <div class="bg-blue-100 p-4 rounded-2xl rounded-tl-none text-blue-800 text-xl font-bold shadow-sm" id="prompt-vi"></div>
                </div>
                <textarea id="input-write" class="w-full p-6 border-2 border-gray-200 rounded-3xl h-48 text-xl outline-none focus:border-green-400 shadow-inner resize-none font-medium" placeholder="Nhập bản dịch tiếng Anh..."></textarea>
            </div>
        </div>

        <div id="check-bar" class="fixed bottom-0 left-0 right-0 border-t-2 border-gray-100 p-6 bg-white">
            <div class="max-w-2xl mx-auto flex justify-between items-center" id="bar-content">
                <button id="check-btn" onclick="handleCheck()" class="w-full bg-gray-200 text-gray-400 py-4 rounded-2xl font-black text-xl shadow-md cursor-not-allowed">KIỂM TRA</button>
            </div>
        </div>
    </section>

    <script>
        /* --- DATA & STATE --- */
        const topics = [
            { id: 'family', name: 'Gia đình & Bạn bè', level: 'A1', icon: '🏠', color: 'green' },
            { id: 'edu', name: 'Giáo dục & Sư phạm', level: 'B1', icon: '🎓', color: 'blue' },
            { id: 'tech', name: 'Công nghệ & IT', level: 'B1', icon: '💻', color: 'purple' }
        ];

        let questions = [
            { type: 'listen', en: "Education is a lifelong journey", vi: "Giáo dục là một hành trình cả đời" },
            { type: 'write', en: "She is a future teacher", vi: "Cô ấy là một giáo viên tương lai" },
            { type: 'write', en: "Sustainable development", vi: "Phát triển bền vững" }
        ];

        let currentQIndex = 0;
        let streak = parseInt(localStorage.getItem('streak')) || 0;
        let exp = parseInt(localStorage.getItem('exp')) || 0;

        /* --- NAVIGATION LOGIC --- */
        function showPage(pageId) {
            document.getElementById('home-page').classList.add('hidden-page');
            document.getElementById('learn-page').classList.add('hidden-page');
            document.getElementById(pageId).classList.remove('hidden-page');
            if(pageId === 'home-page') document.getElementById('navbar').classList.remove('hidden-page');
            else document.getElementById('navbar').classList.add('hidden-page');
        }

        function renderHome() {
            document.getElementById('streak-val').innerText = streak;
            document.getElementById('exp-val').innerText = exp;
            const grid = document.getElementById('topics-grid');
            grid.innerHTML = topics.map(t => `
                <div class="bg-white p-6 rounded-3xl border-2 border-gray-100 hover:border-green-400 cursor-pointer transition-all active:scale-95" onclick="startLesson('${t.id}')">
                    <div class="text-4xl mb-4">${t.icon}</div>
                    <h3 class="font-bold text-xl">${t.name}</h3>
                    <p class="text-gray-400 font-bold text-sm">${t.level}</p>
                </div>
            `).join('');
        }

        /* --- LESSON LOGIC --- */
        function startLesson(topicId) {
            currentQIndex = 0;
            showPage('learn-page');
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQIndex];
            document.getElementById('ui-listening').classList.add('hidden');
            document.getElementById('ui-writing').classList.add('hidden');
            document.getElementById('input-listen').value = "";
            document.getElementById('input-write').value = "";
            resetCheckBar();

            if(q.type === 'listen') {
                document.getElementById('task-instruction').innerText = "Nghe và viết lại";
                document.getElementById('ui-listening').classList.remove('hidden');
                setTimeout(playAudio, 500);
            } else {
                document.getElementById('task-instruction').innerText = "Dịch câu này";
                document.getElementById('ui-writing').classList.remove('hidden');
                document.getElementById('prompt-vi').innerText = q.vi;
            }
            updateProgressBar();
        }

        function playAudio() {
            const msg = new SpeechSynthesisUtterance(questions[currentQIndex].en);
            msg.lang = 'en-US';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function handleCheck() {
            const q = questions[currentQIndex];
            const answer = (q.type === 'listen' ? document.getElementById('input-listen').value : document.getElementById('input-write').value).trim().toLowerCase();
            const correct = q.en.toLowerCase();

            // AI Logic: Tính độ tương đồng
            const similarity = compareAI(answer, correct);
            const isCorrect = similarity >= 0.9;

            showFeedback(isCorrect, q.en);
        }

        function compareAI(s1, s2) {
            if (s1 === s2) return 1.0;
            let m = 0;
            let w1 = s1.split(' '), w2 = s2.split(' ');
            w1.forEach(w => { if(w2.includes(w)) m++; });
            return m / Math.max(w1.length, w2.length);
        }

        function showFeedback(isCorrect, correctAns) {
            const bar = document.getElementById('check-bar');
            const content = document.getElementById('bar-content');
            
            bar.className = `fixed bottom-0 left-0 right-0 p-8 transition-all ${isCorrect ? 'correct-bg' : 'incorrect-bg'}`;
            
            content.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm">
                        <i class="fas ${isCorrect ? 'fa-check text-green-500' : 'fa-times text-red-500'} text-2xl"></i>
                    </div>
                    <div>
                        <h4 class="font-black text-xl ${isCorrect ? 'text-green-800' : 'text-red-800'}">${isCorrect ? 'Chính xác!' : 'Đáp án đúng:'}</h4>
                        <p class="${isCorrect ? 'text-green-600' : 'text-red-600'} font-bold">${isCorrect ? '' : correctAns}</p>
                    </div>
                </div>
                <button onclick="nextStep(${isCorrect})" class="px-10 py-4 ${isCorrect ? 'bg-green-500' : 'bg-red-500'} text-white rounded-2xl font-black shadow-lg active:scale-95 transition">TIẾP TỤC</button>
            `;
        }

        function nextStep(wasCorrect) {
            if(wasCorrect) {
                currentQIndex++;
                if(currentQIndex >= questions.length) {
                    completeLesson();
                } else {
                    loadQuestion();
                }
            } else {
                // Spaced Repetition: Đẩy câu sai xuống cuối để học lại
                const q = questions.splice(currentQIndex, 1)[0];
                questions.push(q);
                loadQuestion();
            }
        }

        function completeLesson() {
            exp += 15;
            streak += 1;
            localStorage.setItem('exp', exp);
            localStorage.setItem('streak', streak);
            alert("🎉 Bạn đã hoàn thành bài học! +15 EXP");
            location.reload();
        }

        function exitLesson() {
            if(confirm("Bạn có chắc muốn thoát? Tiến độ sẽ không được lưu.")) showPage('home-page');
        }

        /* --- UI HELPERS --- */
        function updateProgressBar() {
            const pct = (currentQIndex / questions.length) * 100;
            document.getElementById('lesson-progress').style.width = pct + "%";
        }

        function resetCheckBar() {
            const bar = document.getElementById('check-bar');
            bar.className = "fixed bottom-0 left-0 right-0 border-t-2 border-gray-100 p-6 bg-white";
            document.getElementById('bar-content').innerHTML = `
                <button id="check-btn" onclick="handleCheck()" class="w-full bg-gray-200 text-gray-400 py-4 rounded-2xl font-black text-xl shadow-md cursor-not-allowed">KIỂM TRA</button>
            `;
        }

        // Kích hoạt nút bấm khi có input
        document.addEventListener('input', (e) => {
            const btn = document.getElementById('check-btn');
            if(!btn) return;
            const val = e.target.value.trim();
            if(val.length > 0) {
                btn.classList.replace('bg-gray-200', 'bg-green-500');
                btn.classList.replace('text-gray-400', 'text-white');
                btn.classList.remove('cursor-not-allowed');
            } else {
                btn.classList.replace('bg-green-500', 'bg-gray-200');
                btn.classList.replace('text-white', 'text-gray-400');
                btn.classList.add('cursor-not-allowed');
            }
        });

        // Xử lý tệp tải lên
        document.getElementById('fileInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = JSON.parse(e.target.result);
                questions = data;
                alert("Đã cập nhật bộ từ vựng mới!");
            };
            reader.readAsText(e.target.files[0]);
        };

        window.onload = renderHome;
    </script>
</body>
</html>
