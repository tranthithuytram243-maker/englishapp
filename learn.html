<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang học - EngFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
    <div id="progress-bar" class="w-full h-4 bg-gray-200 fixed top-0">
        <div id="progress-fill" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div>
    </div>

    <div class="max-w-2xl mx-auto mt-12 p-6">
        <div id="question-container" class="min-h-[400px]">
            <h2 id="task-title" class="text-2xl font-bold mb-8">Đang tải...</h2>
            
            <div id="listening-area" class="hidden text-center">
                <button onclick="speak()" class="bg-blue-500 text-white p-6 rounded-full shadow-lg mb-6 hover:scale-105 transition">
                    🔊 Nghe lại
                </button>
                <input type="text" id="listen-input" class="w-full p-4 border-2 rounded-xl text-lg focus:border-blue-400 outline-none" placeholder="Bạn nghe thấy gì?">
            </div>

            <div id="writing-area" class="hidden">
                <p id="vi-sentence" class="text-xl mb-4 italic text-gray-600"></p>
                <textarea id="write-input" class="w-full p-4 border-2 rounded-xl h-32 focus:border-green-400 outline-none" placeholder="Viết câu tiếng Anh hoàn chỉnh..."></textarea>
            </div>
        </div>

        <div id="feedback" class="hidden mt-4 p-4 rounded-xl border-2"></div>

        <button id="check-btn" onclick="checkAnswer()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold text-xl mt-8 shadow-md active:translate-y-1">KIỂM TRA</button>
    </div>

    <script>
        const vocabulary = [
            { id: 1, en: "Education", vi: "Giáo dục", level: "B1", srs: 0 },
            { id: 2, en: "Sustainable development", vi: "Phát triển bền vững", level: "B1", srs: 0 }
        ];

        let currentStep = 0;
        let score = 0;

        function showTask() {
            const area = Math.random() > 0.5 ? 'listening' : 'writing';
            document.getElementById('listening-area').classList.add('hidden');
            document.getElementById('writing-area').classList.add('hidden');
            
            if(area === 'listening') {
                document.getElementById('task-title').innerText = "Nghe và viết lại câu";
                document.getElementById('listening-area').classList.remove('hidden');
                speak(); 
            } else {
                document.getElementById('task-title').innerText = "Dịch sang tiếng Anh";
                document.getElementById('writing-area').classList.remove('hidden');
                document.getElementById('vi-sentence').innerText = vocabulary[0].vi;
            }
        }

        function speak() {
            const msg = new SpeechSynthesisUtterance(vocabulary[0].en);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        async function checkAnswer() {
            const input = document.getElementById('listen-input').value || document.getElementById('write-input').value;
            const target = vocabulary[0].en;
            
            // Giả lập AI chấm điểm (Sử dụng Levenshtein Distance hoặc API OpenAI)
            const similarity = calculateSimilarity(input.toLowerCase(), target.toLowerCase());
            
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');

            if(similarity >= 0.9) {
                feedback.className = "p-4 rounded-xl border-2 bg-green-100 border-green-500 text-green-700 mt-4";
                feedback.innerHTML = "<b>Chính xác!</b> Tiếp tục phát huy.";
                updateProgress(20);
                setTimeout(() => { nextQuestion(); }, 1500);
            } else {
                feedback.className = "p-4 rounded-xl border-2 bg-red-100 border-red-500 text-red-700 mt-4";
                feedback.innerHTML = `<b>AI Phân tích:</b> Bạn sai chính tả hoặc cấu trúc. <br>Đáp án đúng: <i>${target}</i>`;
            }
        }

        function calculateSimilarity(s1, s2) {
            // Logic đơn giản so sánh chuỗi
            return s1.trim() === s2.trim() ? 1 : 0;
        }

        function updateProgress(amt) {
            let current = parseFloat(document.getElementById('progress-fill').style.width);
            document.getElementById('progress-fill').style.width = (current + amt) + "%";
        }

        function nextQuestion() {
            // Logic Spaced Repetition: Tăng độ khó hoặc giãn thời gian gặp lại
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('listen-input').value = "";
            document.getElementById('write-input').value = "";
            showTask();
        }

        window.onload = showTask;
    </script>
</body>
</html>
